version: '3.8'

services:
  # 1. THE DATABASE CONTAINER
  db:
    image: mysql:8.0
    container_name: agency_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: agency_db
      MYSQL_USER: agency_admin
      MYSQL_PASSWORD: agency_password
    volumes:
      - db_data:/var/lib/mysql

  # 2. THE WORDPRESS CONTAINER
  wordpress:
    depends_on:
      - db
    image: wordpress:latest
    container_name: agency_wordpress
    restart: always
    ports:
      - "8085:80"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: agency_admin
      WORDPRESS_DB_PASSWORD: agency_password
      WORDPRESS_DB_NAME: agency_db
    volumes:
      - ./wp-content:/var/www/html/wp-content

volumes:
  db_data: {}