services:
  db:
    image: mysql:8.0
    container_name: agency_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: agency_db
      MYSQL_USER: agency_admin
      MYSQL_PASSWORD: agency_password
    volumes:
      - db_data:/var/lib/mysql

  wordpress:
    depends_on:
      - db
    image: wordpress:latest
    container_name: agency_wordpress
    restart: always
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: agency_admin
      WORDPRESS_DB_PASSWORD: agency_password
      WORDPRESS_DB_NAME: agency_db
      # Štai šios dvi eilutės išspręs redirect klaidą:
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_HOME', 'https://localhost:8443');
        define('WP_SITEURL', 'https://localhost:8443');
    volumes:
      - ./wp-content:/var/www/html/wp-content

  proxy:
    image: caddy:2-alpine
    container_name: agency_proxy
    restart: always
    ports:
      - "8443:8443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - wordpress

volumes:
  db_data: {}
  caddy_data: {}
  caddy_config: {}
